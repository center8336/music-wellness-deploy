<html><head><style>/* ===== Gap map (Overview) — near-wordless constellation; dots are the ink ===== */
        .gapmap {
            background: #fafafa;
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: var(--radius-lg);
            padding: 2rem 1.5rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        .gapmap-head {
            font-family: var(--font-display);
            font-size: var(--text-h3); font-weight: 600;
            color: var(--black); margin: 0 0 0.35rem;
            text-wrap: balance;
        }
        .gapmap-sub {
            font-family: var(--font-mono);
            font-size: var(--text-xs); color: #71717a;
            text-transform: uppercase; letter-spacing: 0.12em;
            margin: 0 0 1.5rem;
        }
        .gapmap-figure { margin: 0; }
        .gapmap-svg { display: block; width: 100%; height: auto; }
        /* the East void must feel deliberate — no fill, just air */
        .gm-grid { stroke: #d4d4d8; stroke-width: 0.6; fill: none; opacity: 0.4; }
        .gm-land { fill: #d4d4d8; opacity: 0.16; }
        .gm-dot { fill: #6667AB; }
        .gm-dot-faint { fill: #6667AB; opacity: 0.4; }
        .gm-india { fill: #6667AB; }
        .gm-india-label, .gm-tw-label {
            font-family: var(--font-mono); font-size: 12px;
            letter-spacing: 0.04em;
        }
        .gm-india-label { fill: #3f3f46; }
        .gm-tw-label { fill: #6667AB; font-weight: 700; }
        /* the one bold focal gesture — the entry-point ring on Taiwan */
        .gm-ring-outer { fill: none; stroke: #6667AB; stroke-width: 2.5; }
        .gm-ring-inner { fill: none; stroke: #6667AB; stroke-width: 1.4; opacity: 0.55; }
        .gm-ring-core { fill: #6667AB; }
        .gm-tally {
            fill: #fafafa; stroke: rgba(0,0,0,0.07); stroke-width: 1;
        }
        .gm-tally-num { font-family: var(--font-display); font-weight: 800; font-size: 22px; fill: #6667AB; }
        .gm-tally-txt { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; fill: #71717a; }
        .gapmap-caption {
            font-family: var(--font-mono);
            font-size: var(--text-xs); color: #71717a;
            line-height: 1.7; letter-spacing: 0.02em;
            margin: 1.25rem 0 0;
        }
        .gapmap-caption .gm-key-dot {
            display: inline-block; width: 0.6em; height: 0.6em; border-radius: 50%;
            background: #6667AB; vertical-align: baseline; margin: 0 0.15em;
        }
        .gapmap-caption strong { color: #6667AB; font-weight: 700; }
        /* one-time settle on the focal ring; fully reduced-motion-gated */
        @keyframes gmRingSettle {
            0%   { opacity: 0; transform: scale(0.6); }
            100% { opacity: 1; transform: scale(1); }
        }
        .gm-ring { transform-box: fill-box; transform-origin: center; animation: gmRingSettle var(--dur-slow) var(--ease) both; }
        @media (prefers-reduced-motion: reduce) {
            .gm-ring { animation: none; opacity: 1; transform: none; }
        }
        @media (max-width: 768px) {
            .gapmap { padding: 1.5rem 1rem 1.25rem; }
            .gm-india-label, .gm-tw-label { font-size: 13px; }
        }

        </style></head><body><svg xmlns="http://www.w3.org/2000/svg" class="gapmap-svg" width="1000" height="480" style="background:#fafafa" viewBox="0 0 1000 480" role="img"
                             aria-label="World map of music mental-health organizations. Support clusters densely in the United States and Europe; India has one independent organization; Taiwan and the rest of East and Southeast Asia have none — the entry point.">
                            <!-- barely-there world hint: faint graticule + softest landmass blobs, no outlines, no labels -->
                            <g class="gm-grid" aria-hidden="true">
                                <line x1="0" y1="80"  x2="1000" y2="80"/>
                                <line x1="0" y1="160" x2="1000" y2="160"/>
                                <line x1="0" y1="240" x2="1000" y2="240"/>
                                <line x1="0" y1="320" x2="1000" y2="320"/>
                                <line x1="0" y1="400" x2="1000" y2="400"/>
                                <line x1="166" y1="0" x2="166" y2="480"/>
                                <line x1="333" y1="0" x2="333" y2="480"/>
                                <line x1="500" y1="0" x2="500" y2="480"/>
                                <line x1="666" y1="0" x2="666" y2="480"/>
                                <line x1="833" y1="0" x2="833" y2="480"/>
                            </g>
                            <g class="gm-land" aria-hidden="true">
                                <!-- North America -->
                                <path d="M120 110 Q190 90 250 120 Q280 160 250 215 Q210 250 175 235 Q135 200 120 110 Z"/>
                                <!-- South America -->
                                <path d="M255 290 Q300 280 305 330 Q295 400 265 420 Q250 360 255 290 Z"/>
                                <!-- Europe -->
                                <path d="M470 120 Q540 110 545 160 Q520 200 480 195 Q455 165 470 120 Z"/>
                                <!-- Africa -->
                                <path d="M480 220 Q560 215 565 290 Q535 370 505 360 Q470 290 480 220 Z"/>
                                <!-- Asia -->
                                <path d="M560 110 Q760 95 830 160 Q820 230 740 250 Q640 240 560 180 Q545 140 560 110 Z"/>
                                <!-- Australia -->
                                <path d="M790 350 Q860 345 870 385 Q840 415 800 405 Q775 380 790 350 Z"/>
                            </g>

                            <!-- THE INK: the purple constellation. Size = org count. -->
                            <!-- faint scatter (the 47 across 33 countries — honest cluster, no invented names) -->
                            <g class="gm-dot-faint" aria-hidden="true">
                                <circle cx="175" cy="135" r="5"/><circle cx="160" cy="200" r="5.5"/>
                                <circle cx="235" cy="155" r="4.5"/><circle cx="205" cy="215" r="5"/>
                                <circle cx="270" cy="320" r="5"/><circle cx="285" cy="360" r="4.5"/>
                                <circle cx="455" cy="130" r="5"/><circle cx="540" cy="125" r="6"/>
                                <circle cx="505" cy="195" r="5.5"/><circle cx="525" cy="170" r="5"/>
                                <circle cx="465" cy="178" r="4.5"/><circle cx="500" cy="135" r="5"/>
                                <circle cx="515" cy="255" r="5"/><circle cx="540" cy="300" r="4.5"/>
                                <circle cx="595" cy="150" r="5.5"/><circle cx="620" cy="185" r="5"/>
                                <circle cx="830" cy="360" r="6.5"/>
                            </g>

                            <!-- named place-bound poles -->
                            <!-- United States — 20, the largest -->
                            <circle class="gm-dot" cx="200" cy="178" r="20"/>
                            <!-- Europe second pole (Germany 8, UK 7, France 6) — overlapping density IS the point -->
                            <circle class="gm-dot" cx="512" cy="150" r="11"/>
                            <circle class="gm-dot" cx="486" cy="146" r="10.5"/>
                            <circle class="gm-dot" cx="495" cy="172" r="9.8"/>

                            <!-- India — the lone independent Asia-Pacific org -->
                            <circle class="gm-india" cx="690" cy="248" r="4.5"/>
                            <text class="gm-india-label" x="700" y="252">India · 1</text>

                            <!-- THE FOCAL GESTURE: Taiwan, the entry point — a hollow target across the empty East -->
                            <g class="gm-ring">
                                <circle class="gm-ring-outer" cx="788" cy="222" r="22"/>
                                <circle class="gm-ring-inner" cx="788" cy="222" r="13"/>
                                <circle class="gm-ring-core"  cx="788" cy="222" r="2.6"/>
                            </g>
                            <text class="gm-tw-label" x="788" y="180" text-anchor="middle">Taiwan · the entry point</text>

                            <!-- off-map tally: the 22 borderless orgs, no home country -->
                            <g transform="translate(40, 372)">
                                <rect class="gm-tally" x="0" y="0" width="196" height="64" rx="6"/>
                                <text class="gm-tally-num" x="16" y="30">22</text>
                                <text class="gm-tally-txt" x="58" y="24">of 110 · borderless</text>
                                <text class="gm-tally-txt" x="58" y="40">no home country</text>
                                <text class="gm-tally-txt" x="16" y="56">helplines · fellowships · networks</text>
                            </g>
                        </svg></body></html>
