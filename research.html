<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Research · MH&W</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

    :root {
      --black: #09090b;
      --off-black: #141416;
      --charcoal: #27272a;
      --graphite: #3f3f46;
      --grey: #71717a;
      --grey-light: #a1a1aa;
      --silver: #d4d4d8;
      --snow: #f4f4f5;
      --white: #fafafa;
      --purple-light: #CBB9D6;
      --purple-deep: #6667AB;
      --signal: var(--purple-deep);
      --signal-dim: #565799;
      --signal-bg: rgba(102, 103, 171, 0.08);
      --signal-glow: rgba(102, 103, 171, 0.2);
      --spectrum-1: #d4799c;
      --spectrum-2: #e8a87c;
      --spectrum-3: #d4c97a;
      --spectrum-4: #85c9a3;
      --spectrum-5: #7aaed4;
      --spectrum-6: #b8a9d4;
      --bg-light: var(--snow);
      --bg-dark: var(--black);
      --bg-card: var(--white);
      --bg-card-dark: var(--off-black);
      --border-light: rgba(0,0,0,0.07);
      --border-dark: rgba(255,255,255,0.1);
      --font-display: 'Syne', 'Space Grotesk', 'Noto Sans TC', system-ui, sans-serif;
      --font-body: 'Space Grotesk', 'Noto Sans TC', system-ui, sans-serif;
      --font-mono: 'Space Mono', 'Courier New', monospace;
      --font: var(--font-body);
      --text-hero: clamp(3.5rem, 8vw, 6.5rem);
      --text-h1: clamp(2rem, 4.5vw, 3rem);
      --text-h2: clamp(1.5rem, 3vw, 2rem);
      --text-h3: clamp(1rem, 2vw, 1.3rem);
      --text-body: 1rem;
      --text-sm: 0.875rem;
      --text-xs: 0.75rem;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --dur: 0.3s;
      --dur-slow: 0.6s;
      --radius: 4px;
      --radius-lg: 6px;
      --max-w: 1100px;
      --max-w-text: 660px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg-light);
      color: var(--black);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--signal); color: var(--white); }

    /* ===== NAVIGATION ===== */
    nav.nav {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      padding: 2rem 2.5rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
      background: transparent;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--grey);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color var(--dur) var(--ease);
    }

    .nav-links a:hover { color: var(--black); }
    .nav-links a.current { color: var(--black); }

    .nav-toggle { display:none; background:none; border:none; cursor:pointer; padding:0.5rem; z-index:101; -webkit-tap-highlight-color:transparent; }
    .nav-toggle span { display:block; width:22px; height:2px; background:var(--charcoal); margin:5px 0; transition:all 0.3s var(--ease); }
    .nav-toggle.open span:nth-child(1) { transform:rotate(45deg) translate(4px,5px); }
    .nav-toggle.open span:nth-child(2) { opacity:0; }
    .nav-toggle.open span:nth-child(3) { transform:rotate(-45deg) translate(4px,-5px); }

    @media (max-width: 768px) {
      nav.nav {
        padding: 1.2rem 1.5rem;
        padding-top: calc(1.2rem + env(safe-area-inset-top));
        right: 0;
        background: none;
        border-bottom: none;
      }
      nav.nav.open {
        background: rgba(244, 244, 245, 0.9);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--border-light);
      }
      .nav-toggle { display:block; }
      .nav-links {
        display: none;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .nav-links.show { display:flex; }
      .nav-links a { font-size: 0.85rem; }
    }

    /* ===== FOREST PAGE (canvas + content as one unit) ===== */
    .forest-page {
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;  /* prevent horizontal scroll */
      overflow-y: visible; /* let tree branches extend upward naturally */
      /* Extra top padding so canvas and content clear the fixed nav */
      padding-top: calc(3rem + env(safe-area-inset-top, 0px));
    }

    .forest-page canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== PAGE CONTENT (floats above canvas) ===== */
    .page-content {
      position: relative;
      z-index: 1;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .page-header {
      padding-top: calc(5rem + env(safe-area-inset-top, 0px));
      padding-bottom: 2rem;
    }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: var(--text-hero);
      font-weight: 800;
      line-height: 1.0;
      color: var(--black);
    }

    /* ===== WORKS GRID ===== */
    .works-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding-bottom: 6rem;
    }

    .work-item {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .work-card {
      display: block;
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 10;
      background: rgba(244, 244, 245, 0.55);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: var(--radius-lg);
      transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
    }

    .work-item:hover .work-card {
      background: rgba(244, 244, 245, 0.72);
      border-color: rgba(102, 103, 171, 0.25);
    }

    .work-card .card-visual {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: transform var(--dur-slow) var(--ease), opacity var(--dur-slow) var(--ease);
    }

    .work-item:hover .card-visual {
      transform: scale(1.02);
    }

    .work-card .card-title {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: 700;
      color: var(--charcoal);
      line-height: 1.2;
      text-align: center;
    }

    .work-card .card-meta {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.5rem;
      text-align: center;
    }

    /* accent-3: forest pool — gradient from mossy-teal to sky-blue, softened edges */
    .work-card.accent-3 {
      background: linear-gradient(
        168deg,
        rgba(133, 201, 163, 0.12) 0%,
        rgba(122, 174, 212, 0.18) 45%,
        rgba(122, 174, 212, 0.22) 100%
      );
      border-color: rgba(122, 174, 212, 0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3),
                  0 2px 12px rgba(122, 174, 212, 0.06);
    }
    .work-item:hover .work-card.accent-3 {
      background: linear-gradient(
        168deg,
        rgba(133, 201, 163, 0.16) 0%,
        rgba(122, 174, 212, 0.25) 45%,
        rgba(122, 174, 212, 0.28) 100%
      );
      border-color: rgba(122, 174, 212, 0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35),
                  0 3px 16px rgba(122, 174, 212, 0.1);
    }

    .work-item .caption {
      padding: 0.75rem 0.25rem 0;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--charcoal);
      line-height: 1.4;
    }

    .work-item .caption .author { font-weight: 600; }

    .work-item .caption .type {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--grey);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.25rem;
    }

    .work-card.placeholder {
      background: rgba(244, 244, 245, 0.15);
      border: 1.5px dashed var(--silver);
      border-radius: var(--radius-lg);
    }

    .work-card.placeholder .card-title {
      color: var(--grey-light);
      font-size: var(--text-sm);
      font-weight: 400;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .works-list {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .forest-page { padding-top: calc(2rem + env(safe-area-inset-top, 0px)); }

      .page-header {
        padding-top: calc(4rem + env(safe-area-inset-top, 0px));
        padding-bottom: 1.2rem;
      }

      .page-header h1 {
        font-size: clamp(2.5rem, 12vw, 3.5rem);
      }

      .work-card {
        aspect-ratio: 16 / 9;
      }

      .work-item .caption {
        padding: 0.75rem 0 1.5rem;
      }

      .work-card.placeholder {
        background: transparent;
        /* keep dashed border visible on mobile */
      }

      .work-card.placeholder .card-title {
        color: var(--grey-light);
        opacity: 0.6;
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .works-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

  <!-- Forest Page: canvas background + content -->
  <section class="forest-page">
    <canvas id="forest"></canvas>

    <div class="page-content">
      <div class="page-header">
        <h1>Research</h1>
      </div>

      <!-- Works Grid -->
      <div class="works-list">

        <!-- Détári 2020 -->
        <a class="work-item" href="detari-2020-critical.html" data-tree>
          <div class="work-card accent-3">
            <div class="card-visual">
              <div>
                <div class="card-title">Psychosocial Work Environment Among Musicians</div>
                <div class="card-meta">Détári et al. · 2020 · Frontiers in Psychology</div>
              </div>
            </div>
          </div>
        </a>

        <!-- Placeholder -->
        <div class="work-item" data-ghost>
          <div class="work-card placeholder">
            <div class="card-visual">
              <div>
                <div class="card-title">More coming</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script>
  (function() {
    'use strict';

    var canvas = document.getElementById('forest');
    var ctx = canvas.getContext('2d');
    var forestEl = document.querySelector('.forest-page');
    var W, H, dpr;
    var SEED = 71;
    var time = 0;

    var segments = [];
    var particles = [];
    var treeSway = [];
    var treeGhost = [];

    // --- Seeded PRNG (mulberry32) ---
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    var rng;
    function rand(min, max) {
      if (max === undefined) { max = min; min = 0; }
      return min + rng() * (max - min);
    }

    // ===== BUILD: recursive branch segments =====
    function buildBranch(x, y, angle, length, depth, maxDepth, treeIdx, scale, ghost) {
      if (depth > maxDepth || length < 1.5) return;

      var endX = x + Math.cos(angle) * length;
      var endY = y + Math.sin(angle) * length;
      var depthRatio = depth / maxDepth;

      // Ghost trees are fainter — but bump alpha on mobile so they're still visible
      var mobileBoost = (W <= 768) ? 2.8 : 1.0;
      var alphaBase = ghost ? 0.15 * mobileBoost : 0.55;
      var alphaFade = ghost ? 0.08 : 0.4;

      segments.push({
        x1: x, y1: y, x2: endX, y2: endY,
        angle: angle,
        length: length,
        depth: depth,
        maxDepth: maxDepth,
        treeIdx: treeIdx,
        ghost: ghost,
        weight: Math.max(0.3, ((ghost ? (W <= 768 ? 1.6 : 1.2) : 2.0) - depthRatio * (ghost ? 0.8 : 1.7)) * scale),
        alpha: Math.max(0.04, alphaBase - depthRatio * alphaFade),
        swayPhase: rand(0, Math.PI * 2),
        swayAmp: rand(0.003, 0.012) * (depthRatio + 0.1),
        hasDot: depth >= maxDepth - 2 && rng() < (ghost ? 0.3 : 0.5),
        dotSize: rand(0.5, 1.4) * scale
      });

      var branches = depth < 2 ? 2 : (rng() < 0.25 ? 3 : 2);
      var spread = rand(0.22, 0.50);
      var shrink = rand(0.60, 0.76);
      if (depth > 3 && rng() < 0.15) return;

      for (var b = 0; b < branches; b++) {
        var bAngle;
        if (branches === 2) {
          bAngle = angle + (b === 0 ? -spread : spread) + rand(-0.12, 0.12);
        } else {
          bAngle = angle + (b - 1) * spread + rand(-0.08, 0.08);
        }
        buildBranch(endX, endY, bAngle, length * shrink + rand(-2, 2), depth + 1, maxDepth, treeIdx, scale, ghost);
      }
    }

    // ===== BUILD FOREST: pre-existing landscape + article trees =====
    // 見樹又見林 — the forest already exists; the researcher walks through it.
    // Ambient trees fill the landscape regardless of article count.
    // Article-linked trees are slightly more prominent — they're the ones you've found so far.
    function buildForest() {
      rng = mulberry32(SEED);
      segments = [];
      particles = [];
      treeSway = [];
      treeGhost = [];

      var isMobile = W <= 768;
      var scale = isMobile ? 0.7 : 1.0;
      // On mobile, cards stack → H grows large. Cap the reference height
      // so trees stay proportional to screen width, not page length.
      var refH = isMobile ? Math.min(H, W * 2.2) : H;
      var treeIdx = 0;

      // --- 1. Ambient forest: trees that exist independent of articles ---
      // 見樹又見林 — the forest must still feel like a forest on mobile.
      // Use stratified Y bands so every vertical zone gets guaranteed trees.
      var ambientCount = isMobile ? 18 : 12;
      var bandH = (H * 0.83) / ambientCount; // divide usable height into bands
      for (var a = 0; a < ambientCount; a++) {
        var tx = isMobile ? rand(W * 0.06, W * 0.94) : rand(W * 0.03, W * 0.97);
        // Stratified: each tree gets a vertical band, with jitter within band
        var bandTop = H * 0.12 + a * bandH;
        var ty = rand(bandTop, bandTop + bandH);

        var angle = -Math.PI / 2 + rand(-0.2, 0.2);
        var trunkLen = rand(refH * 0.05, refH * 0.13) * scale;
        var maxD = Math.floor(rand(4, 7));

        treeGhost.push(true);
        treeSway.push({
          phase: rand(0, Math.PI * 2),
          speed: rand(0.0003, 0.0008),
          amp: rand(0.006, 0.014)
        });

        buildBranch(tx, ty, angle, trunkLen, 0, maxD, treeIdx, scale * 0.85, true);
        treeIdx++;
      }

      // --- 2. Article-linked trees: positioned behind their cards ---
      var cards = document.querySelectorAll('.works-list .work-item');
      var forestRect = forestEl.getBoundingClientRect();

      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var ghost = card.hasAttribute('data-ghost');
        var cardRect = card.getBoundingClientRect();

        // Tree grows upward from below the card's center.
        // On mobile, start lower so branches don't clip past the container top.
        var cx = cardRect.left + cardRect.width / 2 - forestRect.left;
        var cyRatio = isMobile ? 0.95 : 0.8;
        var cy = cardRect.top + cardRect.height * cyRatio - forestRect.top;

        // Slight random offset so it doesn't look mechanical
        var jitter = isMobile ? 10 : 20;
        cx += rand(-jitter, jitter);

        var angle = -Math.PI / 2 + rand(-0.15, 0.15);
        // Ghost trees are smaller but still proper trees, not twigs.
        // On mobile, bump ghost size so the "More coming" card has a visible tree.
        var ghostTrunkMin = isMobile ? refH * 0.10 : refH * 0.06;
        var ghostTrunkMax = isMobile ? refH * 0.18 : refH * 0.10;
        var trunkLen = ghost
          ? rand(ghostTrunkMin, ghostTrunkMax)
          : rand(refH * 0.12, refH * 0.22);
        var maxD = ghost
          ? Math.floor(rand(isMobile ? 5 : 3, isMobile ? 7 : 5))
          : Math.floor(rand(isMobile ? 5 : 6, isMobile ? 7 : 9));

        treeGhost.push(ghost);
        treeSway.push({
          phase: rand(0, Math.PI * 2),
          speed: rand(0.0004, 0.001),
          amp: rand(0.008, 0.018)
        });

        buildBranch(cx, cy, angle, trunkLen, 0, maxD, treeIdx, scale, ghost);
        treeIdx++;
      }

      // --- 3. Particles: spores / connections in the research ecosystem ---
      var basePCount = W > 768 ? 30 : 16;
      var pCount = Math.min(basePCount, 90);
      for (var p = 0; p < pCount; p++) {
        particles.push({
          x: rand(0, W),
          y: rand(H * 0.05, H * 0.98),
          baseX: 0,
          size: rand(0.5, 2.2),
          speed: rand(0.04, 0.18),
          drift: rand(-0.1, 0.1),
          opacity: rand(0.03, 0.15),
          phase: rand(0, Math.PI * 2)
        });
        particles[particles.length - 1].baseX = particles[particles.length - 1].x;
      }
    }

    // ===== DRAW FRAME =====
    function drawFrame() {
      ctx.clearRect(0, 0, W, H);
      time++;

      // -- Trees --
      for (var s = 0; s < segments.length; s++) {
        var seg = segments[s];
        var ts = treeSway[seg.treeIdx];

        var sway = Math.sin(time * ts.speed + ts.phase + seg.swayPhase) * (ts.amp + seg.swayAmp);
        var depthFactor = seg.depth / seg.maxDepth;
        var swayAngle = sway * depthFactor;

        var newAngle = seg.angle + swayAngle;
        var sx2 = seg.x1 + Math.cos(newAngle) * seg.length;
        var sy2 = seg.y1 + Math.sin(newAngle) * seg.length;

        var parentSway = swayAngle * 0.4 * depthFactor;
        var sx1 = seg.x1 + Math.sin(time * ts.speed * 0.7 + seg.swayPhase) * parentSway * seg.length * 0.2;
        var sy1 = seg.y1;

        ctx.beginPath();
        ctx.moveTo(sx1, sy1);
        ctx.lineTo(sx2, sy2);
        ctx.strokeStyle = 'rgba(39, 39, 42, ' + seg.alpha + ')';
        ctx.lineWidth = seg.weight;
        ctx.lineCap = 'round';
        ctx.stroke();

        if (seg.hasDot) {
          ctx.beginPath();
          ctx.arc(sx2, sy2, seg.dotSize, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(39, 39, 42, ' + (seg.alpha * 0.4) + ')';
          ctx.fill();
        }
      }

      // -- Particles --
      for (var p = 0; p < particles.length; p++) {
        var pt = particles[p];
        pt.y -= pt.speed;
        pt.x = pt.baseX + Math.sin(time * 0.003 + pt.phase) * 12;
        pt.baseX += pt.drift * 0.08;

        if (pt.y < -5) {
          pt.y = H + 5;
          pt.baseX = rand(0, W);
          pt.x = pt.baseX;
        }
        if (pt.baseX < -20) pt.baseX = W + 10;
        if (pt.baseX > W + 20) pt.baseX = -10;

        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(39, 39, 42, ' + pt.opacity + ')';
        ctx.fill();
      }

      // -- Mycelium connections --
      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          var maxDist = W > 768 ? 80 : 55;
          if (dist < maxDist) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'rgba(39, 39, 42, ' + ((1 - dist / maxDist) * 0.04) + ')';
            ctx.lineWidth = 0.4;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawFrame);
    }

    // ===== SIZING =====
    function resize() {
      W = forestEl.offsetWidth;
      H = forestEl.offsetHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildForest();
    }

    // ===== INIT =====
    // Wait for layout to settle so card positions are correct
    window.addEventListener('load', function() {
      resize();
      drawFrame();
    });

    // Fallback if load already fired
    if (document.readyState === 'complete') {
      resize();
      drawFrame();
    }

    var resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 200);
    });
  })();
  </script>
</body>
</html>
