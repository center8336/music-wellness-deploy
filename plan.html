<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PLAN | MH&W</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --black: #09090b;
    --off-black: #141416;
    --charcoal: #27272a;
    --graphite: #3f3f46;
    --grey: #71717a;
    --grey-light: #a1a1aa;
    --silver: #d4d4d8;
    --white: #fafafa;
    --purple-light: #CBB9D6;
    --purple-deep: #6667AB;
    --signal: var(--purple-deep);
    --signal-dim: #565799;

    /* — PERIMETRON-inspired spectrum — */
    --spectrum-1: #d4799c;
    --spectrum-2: #e8a87c;
    --spectrum-3: #d4c97a;
    --spectrum-4: #85c9a3;
    --spectrum-5: #7aaed4;
    --spectrum-6: #b8a9d4;

    /* — Font stacks — */
    --font-display: 'Syne', 'Space Grotesk', 'Noto Sans TC', system-ui, sans-serif;
    --font-body: 'Space Grotesk', 'Noto Sans TC', system-ui, sans-serif;
    --font-mono: 'Space Mono', 'Courier New', monospace;

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --dur: 0.3s;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--black);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
    overflow-x: hidden;
  }
  ::selection { background: var(--signal); color: var(--white); }

  /* ════════════════════════════════════════
     NAV — Mono, editorial (PERIMETRON)
     ════════════════════════════════════════ */
  .nav {
    position: fixed; top: 0; left: 0; z-index: 100;
    display: flex; flex-direction: column;
    padding: 2rem 2.5rem;
    padding-top: calc(2rem + env(safe-area-inset-top));
    padding-left: calc(2.5rem + env(safe-area-inset-left));
  }
  .nav-links {
    display: flex; gap: 2.5rem; margin-bottom: 1rem;
  }
  .nav-links a {
    font-family: var(--font-mono);
    font-size: 1.15rem; font-weight: 400;
    color: var(--grey); text-decoration: none;
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: color var(--dur) var(--ease);
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a.current { color: var(--white); }

  .nav-brand {
    font-family: var(--font-display);
    font-size: 1.5rem; font-weight: 800;
    color: var(--white); text-transform: uppercase;
    letter-spacing: 0.1em; line-height: 1.1;
  }
  .nav-sub {
    font-family: var(--font-mono);
    font-size: 0.95rem; font-weight: 400;
    color: var(--purple-light);
    text-transform: uppercase; letter-spacing: 0.22em;
  }

  /* ════════════════════════════════════════
     HERO: FULL BLEED
     ════════════════════════════════════════ */
  .hero {
    position: relative;
    width: 100%; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    padding-top: calc(5rem + env(safe-area-inset-top, 0px));
    padding-bottom: 2rem;
  }

  .hero-photo {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--black);
    z-index: 0;
  }
  .hero-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.35;
    filter: grayscale(0.3) contrast(1.25) brightness(1.1);
  }

  #wave-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1; pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: soft-light;
  }

  /* PERIMETRON-inspired light & shadow — natural rim-light with cinematic vignette */
  .hero::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    /* Soft spotlight from upper-center — simulates studio backlight hitting the subject */
    background:
      radial-gradient(ellipse 50% 45% at 50% 38%, rgba(203,185,214,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 80% 70% at 50% 45%, transparent 20%, rgba(9,9,11,0.55) 100%);
    z-index: 1; pointer-events: none;
    mix-blend-mode: screen;
  }
  .hero::after {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    /* Heavy vignette + top/bottom fade — PERIMETRON-style depth */
    background:
      radial-gradient(ellipse 60% 55% at 50% 48%, transparent 25%, rgba(9,9,11,0.65) 85%, rgba(9,9,11,0.88) 100%),
      linear-gradient(180deg, rgba(9,9,11,0.55) 0%, transparent 18%, transparent 72%, rgba(9,9,11,0.92) 100%),
      linear-gradient(90deg, rgba(9,9,11,0.4) 0%, transparent 15%, transparent 85%, rgba(9,9,11,0.4) 100%);
    z-index: 2; pointer-events: none;
  }

  /* ════════════════════════════════════════
     HERO CONTENT
     ════════════════════════════════════════ */
  .hero-content {
    position: relative; z-index: 3;
    text-align: center;
    padding: 2rem;
    max-width: 860px;
  }

  /* Eyebrow — mono label (PERIMETRON VIYTF style) */
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem; font-weight: 400;
    letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--white);
    margin-bottom: 3rem;
    position: relative;
    display: inline-block;
  }
  /* Title — Syne display (editorial weight) */
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 1.5rem;
  }
  .hero-title em {
    font-style: normal;
    color: var(--purple-light);
  }
  .hero-title .dot {
    color: var(--purple-deep);
  }

  /* Statement — Body light (editorial contrast) */
  .hero-statement {
    font-family: var(--font-body);
    font-size: clamp(1rem, 2vw, 1.35rem);
    font-weight: 300;
    font-style: italic;
    color: var(--grey-light);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    max-width: 520px;
    margin: 0 auto 4.5rem;
    line-height: 1.6;
  }

  /* Thin separator */
  .hero-divider {
    width: 60px; height: 1px;
    background: var(--purple-deep);
    margin: 0 auto 4.5rem;
    opacity: 0.5;
  }

  /* ════════════════════════════════════════
     PHASE GRID — Rainbow spectrum names
     ════════════════════════════════════════ */
  .phase-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3.5rem 6rem;
    max-width: 640px;
    margin: 0 auto;
    text-align: left;
  }

  .phase-item { position: relative; }

  .phase-years {
    font-family: var(--font-mono);
    font-size: 0.58rem; font-weight: 400;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 0.7rem;
  }

  .phase-name {
    font-family: var(--font-display);
    font-size: 1.35rem; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 0.7rem;
    transition: opacity var(--dur) var(--ease);
  }
  .phase-item:hover .phase-name {
    opacity: 0.7;
  }
  /* Spectrum colors — each phase gets its own */
  .phase-item:nth-child(1) .phase-name { color: var(--spectrum-1); }
  .phase-item:nth-child(2) .phase-name { color: var(--spectrum-5); }

  .phase-track {
    font-family: var(--font-body);
    font-size: 0.82rem; font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--grey);
    line-height: 1.8;
  }

  .phase-track span {
    display: block;
  }

  .track-label {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--grey);
    margin-top: 0.5rem;
    opacity: 0.5;
  }


  /* ════════════════════════════════════════
     RESPONSIVE
     ════════════════════════════════════════ */
  /* Hamburger toggle */
  .nav-toggle { display:none; background:none; border:none; cursor:pointer; padding:0.5rem; z-index:101; -webkit-tap-highlight-color:transparent; }
  .nav-toggle span { display:block; width:22px; height:2px; background:var(--grey); margin:5px 0; transition:all 0.3s var(--ease); }
  .nav-toggle.open span:nth-child(1) { transform:rotate(45deg) translate(4px,5px); }
  .nav-toggle.open span:nth-child(2) { opacity:0; }
  .nav-toggle.open span:nth-child(3) { transform:rotate(-45deg) translate(4px,-5px); }

  @media (max-width: 768px) {
    .nav { padding: 1.2rem 1.5rem; padding-top: calc(1.2rem + env(safe-area-inset-top)); right:0; background:none; border-bottom:none; }
    .nav.open { background:rgba(9,9,11,0.95); border-bottom:1px solid var(--border-dark); }
    .nav-toggle { display:block; }
    .nav-toggle span { background:var(--grey-light); }
    .nav-links { display:none; flex-direction:column; gap:0.75rem; margin-top:1rem; }
    .nav-links.show { display:flex; }
    .nav-links a { font-size: 0.85rem; }
    .nav-brand { display:none; }
    .nav-sub { display:none; }
    .hero { padding-top: calc(4.5rem + env(safe-area-inset-top, 0px)); padding-bottom: 1.5rem; }
    .hero-photo img { opacity: 0.5; }
    .hero::after {
      background:
        radial-gradient(ellipse 60% 55% at 50% 48%, transparent 25%, rgba(9,9,11,0.5) 85%, rgba(9,9,11,0.75) 100%),
        linear-gradient(180deg, rgba(9,9,11,0.45) 0%, transparent 18%, transparent 72%, rgba(9,9,11,0.85) 100%),
        linear-gradient(90deg, rgba(9,9,11,0.3) 0%, transparent 15%, transparent 85%, rgba(9,9,11,0.3) 100%);
    }
    .hero-content { padding: 1.5rem 1rem; }
    .hero-eyebrow { margin-bottom: 2rem; }
    .hero-statement { margin: 0 auto 3rem; }
    .hero-divider { margin: 0 auto 3rem; }
    .phase-grid { grid-template-columns: 1fr; gap: 2.5rem; max-width: 360px; }
  }
  @media (max-width: 480px) {
    .nav { padding: 1rem 1rem; padding-top: calc(1rem + env(safe-area-inset-top)); }
    .nav-links a { font-size: 0.78rem; }
    .nav-brand { font-size: 0.88rem; }
    .nav-sub { letter-spacing: 0.1em; font-size: 0.75rem; }
    .hero-content { padding: 1rem; }
    .hero-eyebrow { letter-spacing: 0.15em; }
    .hero-statement { letter-spacing: 0.02em; }
    .phase-grid { gap: 2rem; }
  }

  /* ════════════════════════════════════════
     LOAD ANIMATION
     ════════════════════════════════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-content > * {
    animation: fadeUp 0.9s var(--ease) both;
  }
  .hero-eyebrow { animation-delay: 0.15s; }
  .hero-title { animation-delay: 0.35s; }
  .hero-statement { animation-delay: 0.55s; }
  .hero-divider { animation-delay: 0.65s; }
  .phase-grid { animation: fadeUp 0.9s var(--ease) 0.8s both; }

  /* ════════════════════════════════════════
     DRAG & DROP (hidden utility)
     ════════════════════════════════════════ */
  .drop-hint {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 999;
    background: rgba(9,9,11,0.85);
    justify-content: center; align-items: center;
    font-family: var(--font-body);
    font-size: 1.2rem; font-weight: 400;
    color: var(--purple-light);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border: 2px dashed var(--purple-deep);
    pointer-events: none;
  }
  .drop-hint.active { display: flex; }
</style>
</head>

<!-- ══ WAVEFORM ══ -->
<script>
(function() {
  'use strict';
  var canvas = document.getElementById('wave-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var LINE_COUNT = 35;
  var time = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < LINE_COUNT; i++) {
      var yn = i / (LINE_COUNT - 1);
      var y = yn * H;
      var vFade = Math.sin(yn * Math.PI);
      var opacity = vFade * 0.55;

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(102, 103, 171, ' + opacity + ')';
      ctx.lineWidth = 0.8;

      for (var x = 0; x < W; x += 4) {
        var xn = x / W;
        var hFade = Math.sin(xn * Math.PI);
        var wave = Math.sin(xn * 4 + time * 0.12 - yn * 3) * 18;
        wave += Math.sin(xn * 8 + time * 0.25 + yn * 2) * 8;
        wave += Math.sin(xn * 2 - time * 0.06 + yn * 1.5) * 25;
        var breath = 0.6 + Math.sin(time * 0.04 + yn * 2) * 0.4;
        wave *= hFade * breath;

        if (x === 0) ctx.moveTo(x, y + wave);
        else ctx.lineTo(x, y + wave);
      }
      ctx.stroke();
    }
    time += 0.6;
    requestAnimationFrame(draw);
  }
  draw();

  /* Drag & drop */
  var heroImg = document.getElementById('hero-img');
  var hint = document.getElementById('drop-hint');
  document.addEventListener('dragover', function(e) {
    e.preventDefault();
    hint.classList.add('active');
  });
  document.addEventListener('dragleave', function(e) {
    if (!e.relatedTarget || e.relatedTarget === document.documentElement) {
      hint.classList.remove('active');
    }
  });
  document.addEventListener('drop', function(e) {
    e.preventDefault();
    hint.classList.remove('active');
    var file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        heroImg.src = ev.target.result;
        heroImg.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });
})();
</script>
